name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install .
      - name: Compile Python
        run: python -m compileall -q src run.py tests
      - name: Run tests
        run: python -m unittest discover -s tests -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build demo image
        run: docker build -t intelligent-data-query:ci .
